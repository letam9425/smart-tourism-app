name: smart_tourism_app
description: Ứng dụng du lịch thông minh tích hợp AI cho Việt Nam
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2               # Đã sửa để khớp flutter_localizations

  flutter_riverpod: ^2.5.1
  dio: ^5.6.0
  image_picker: ^1.1.2
  google_maps_flutter: ^2.9.0
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  flutter_spinkit: ^5.2.1
  fluttertoast: ^8.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/